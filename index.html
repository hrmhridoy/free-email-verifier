<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Free Email Verifier</title>
  <style>
    body { margin: 0; font-family: Inter, system-ui, sans-serif; background: #eef2ff; color: #111827; }
    .page { max-width: 720px; margin: 0 auto; padding: 32px; }
    .card { background: #ffffff; border-radius: 24px; box-shadow: 0 20px 60px rgba(15, 23, 42, 0.08); padding: 28px; }
    h1 { margin-bottom: 12px; font-size: 2.2rem; }
    p { margin: 0 0 20px; color: #475569; }
    input, button { width: 100%; padding: 14px 16px; border-radius: 14px; border: 1px solid #cbd5e1; font-size: 1rem; }
    button { background: #4338ca; color: white; border: none; cursor: pointer; transition: background 0.2s ease; }
    button:hover { background: #3730a3; }
    label { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; font-size: 0.95rem; color: #334155; }
    .results { margin-top: 24px; }
    .status { padding: 16px; border-radius: 16px; background: #eef2ff; margin-bottom: 16px; }
    .status.valid { border-left: 4px solid #22c55e; }
    .status.invalid { border-left: 4px solid #ef4444; }
    .status.undetermined { border-left: 4px solid #f59e0b; }
    .code { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; font-size: 0.95rem; white-space: pre-wrap; background: #f8fafc; padding: 14px; border-radius: 14px; border: 1px solid #e2e8f0; }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <h1>Free Email Verifier</h1>
      <p>Deployable on Vercel with a serverless Python API. Enter an email and verify it through syntax, MX, SMTP, and web presence.</p>
      <input id="email" type="email" placeholder="example@domain.com" autocomplete="off" />
      <label><input id="presence" type="checkbox" checked /> Check web presence (Gravatar)</label>
      <button onclick="verifyEmail()">Verify Email</button>
      <div id="feedback" class="results"></div>
    </div>
  </div>
  <script>
    async function verifyEmail() {
      const email = document.getElementById('email').value.trim();
      const presence = document.getElementById('presence').checked;
      const feedback = document.getElementById('feedback');
      feedback.innerHTML = '';

      if (!email) {
        feedback.innerHTML = '<div class="status invalid">Please enter a valid email address.</div>';
        return;
      }

      feedback.innerHTML = '<div class="status">Verifying…</div>';

      try {
        const response = await fetch('/api/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, check_web_presence: presence })
        });

        const result = await response.json();
        const statusClass = result.overall_status === 'valid' ? 'valid' : result.overall_status === 'invalid' ? 'invalid' : 'undetermined';

        feedback.innerHTML = `<div class="status ${statusClass}"><strong>Overall Status:</strong> ${result.overall_status.toUpperCase()}</div>`;
        feedback.innerHTML += `<div class="code">${JSON.stringify(result, null, 2)}</div>`;
      } catch (error) {
        feedback.innerHTML = `<div class="status invalid"><strong>Error:</strong> ${error.message}</div>`;
      }
    }
  </script>
</body>
</html>
